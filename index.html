<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>會考模擬試題解析與測驗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f5f6fa;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .content-card {
            background-color: #ffffff;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #f3f4f6;
        }
        
        .nav-item.active {
            background-color: #fffbeb;
            color: #d97706;
            border-right: 4px solid #f59e0b;
            font-weight: 900;
        }
        .nav-item:not(.active):hover {
            background-color: #f9fafb;
        }

        .tag-bank { background-color: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .tag-vol { background-color: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    </style>
</head>
<body class="h-[100dvh] w-full flex flex-col overflow-hidden overscroll-none">

    <div id="app" class="w-full h-full flex flex-col overflow-hidden relative"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAxQFt76ZPXE7d0i1XeNZ1yiiD2WYNIfHs", 
            authDomain: "chinese-learning-47f4d.firebaseapp.com",
            projectId: "chinese-learning-47f4d",
            storageBucket: "chinese-learning-47f4d.firebasestorage.app",
            messagingSenderId: "76289812052",
            appId: "1:76289812052:web:898384a916f9f341f62fc1"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'CAP-Exam';
        const COLLECTION_NAME = 'Questions'; 
        
        let app, auth, db;
        let isFirebaseInitialized = false;
        let currentUser = null;
        let username = '';
        let userData = { mistakes: [], quizHistory: [], loginHistory: [], quizState: null };
        let connectionStatus = 'loading';
        
        let unsubscribeUser = null;
        let unsubscribeGlobal = null;
        let allQuestions = [];
        
        // 系統常數設定
        const BANKS = ["全部", "文揚題庫", "3688", "3800", "3800+"];
        const VOLUMES = ["全部", "第1冊", "第2冊", "第1~2冊", "第3冊", "第1~3冊", "第4冊", "第1~4冊", "第5冊", "第1~5冊", "第6冊", "第1~6冊"];
        const SUBJECTS = ["全部", "國文", "英文", "數學", "自然", "社會", "歷史", "地理", "公民", "生物", "理化", "地球科學"];
        let currentFilter = { subject: "全部", bank: "全部", volume: "全部" };

        let audioCtx = null;
        let currentTab = 'learn';
        let quizState = { active: false, isFinished: false, questions: [] };

        window.customAlert = (msg) => {
            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 bg-black/40 z-[110] flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in';
            overlay.innerHTML = `
                <div class="bg-white rounded-2xl p-8 max-w-sm w-full shadow-2xl text-center">
                    <div class="text-amber-500 text-5xl mb-4"><i class="fas fa-info-circle"></i></div>
                    <p class="text-gray-700 mb-6 font-bold text-lg md:text-xl leading-relaxed">${msg}</p>
                    <button id="btn-alert-ok" class="px-8 py-3 rounded-full font-bold bg-amber-500 text-white hover:bg-amber-600 transition-colors w-full text-lg">知道了</button>
                </div>
            `;
            document.body.appendChild(overlay);
            document.getElementById('btn-alert-ok').onclick = () => document.body.removeChild(overlay);
        };

        window.customConfirm = (msg, onYes) => {
            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 bg-black/40 z-[110] flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in';
            overlay.innerHTML = `
                <div class="bg-white rounded-2xl p-8 max-w-sm w-full shadow-2xl">
                    <div class="flex items-center mb-4 text-red-500">
                        <i class="fas fa-exclamation-triangle text-3xl mr-3"></i>
                        <h3 class="text-2xl font-bold">請確認</h3>
                    </div>
                    <p class="text-gray-600 mb-8 font-medium text-lg leading-relaxed">${msg}</p>
                    <div class="flex justify-end space-x-3">
                        <button id="btn-modal-no" class="px-6 py-2.5 rounded-lg font-bold bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors text-lg">取消</button>
                        <button id="btn-modal-yes" class="px-6 py-2.5 rounded-lg font-bold bg-red-500 text-white hover:bg-red-600 transition-colors text-lg">確定執行</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            document.getElementById('btn-modal-no').onclick = () => document.body.removeChild(overlay);
            document.getElementById('btn-modal-yes').onclick = () => { document.body.removeChild(overlay); if(onYes) onYes(); };
        };

        const initAudio = () => {
            if (!audioCtx) {
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    audioCtx = new AudioContext();
                } catch(e) {}
            }
        };
        const playTone = (freq, type, duration) => {
            initAudio();
            if(!audioCtx) return;
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = type;
                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        };
        const playCorrectSound = () => { playTone(523.25, 'sine', 0.1); setTimeout(() => playTone(659.25, 'sine', 0.2), 100); };
        const playWrongSound = () => { playTone(300, 'sawtooth', 0.2); setTimeout(() => playTone(200, 'sawtooth', 0.3), 150); };

        const el = id => document.getElementById(id);

        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            isFirebaseInitialized = true;
            connectionStatus = 'success';
        } catch (error) { connectionStatus = 'error'; }

        const listenToGlobalDatabase = () => {
            if (!isFirebaseInitialized || !currentUser) return;
            const qCol = collection(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME);
            
            if(unsubscribeGlobal) unsubscribeGlobal();
            unsubscribeGlobal = onSnapshot(qCol, (snap) => {
                let temp = [];
                snap.forEach(d => temp.push(d.data()));
                allQuestions = temp;
                
                // Refresh current view if needed
                if(currentTab === 'learn' && document.getElementById('main-content')) {
                    renderLearnView(document.getElementById('main-content'));
                }
            }, (error) => {
                console.error("Db listen error", error);
            });
        };

        const listenToUserDocument = (name) => {
            if (!isFirebaseInitialized || !currentUser) return;
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', `${COLLECTION_NAME}_profiles`, name);
            if(unsubscribeUser) unsubscribeUser();
            unsubscribeUser = onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    userData = Object.assign({ mistakes: [], quizHistory: [], loginHistory: [], quizState: null }, data);
                    
                    if (userData.quizState && userData.quizState.active) {
                        quizState = userData.quizState;
                        if(currentTab === 'quiz' && el('main-content')) renderQuizView(el('main-content'));
                    }
                } else {
                    userData = { mistakes: [], quizHistory: [], loginHistory: [new Date().toISOString()], quizState: null };
                    setDoc(userRef, userData, { merge: true });
                }
                
                if(currentTab === 'mistakes' && el('main-content')) renderMistakes(el('main-content'));
                else if(currentTab === 'history' && el('main-content')) renderHistory(el('main-content'));
            });
        };

        const saveUserDataToCloud = async () => {
            if (!isFirebaseInitialized || !currentUser || !username) return;
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', `${COLLECTION_NAME}_profiles`, username);
            try { await setDoc(userRef, userData, { merge: true }); } catch(e) {}
        };

        const saveQuizState = () => {
            userData.quizState = quizState;
            saveUserDataToCloud();
        };

        window.handleLogin = async (name) => {
            if(!name.trim()) return customAlert("請輸入您的姓名再開始使用！");
            
            username = name.trim();
            localStorage.setItem(`CAPExam_last_user`, username);
            
            if (isFirebaseInitialized && currentUser) {
                const now = new Date().toISOString();
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', `${COLLECTION_NAME}_profiles`, username);
                try {
                    const snap = await getDoc(userRef);
                    if (snap.exists()) {
                        userData = Object.assign({ mistakes: [], quizHistory: [], loginHistory: [], quizState: null }, snap.data());
                        if (userData.quizState && userData.quizState.active) quizState = userData.quizState;
                    }
                    if (!userData.loginHistory) userData.loginHistory = [];
                    userData.loginHistory.push(now);
                    if (userData.loginHistory.length > 50) userData.loginHistory = userData.loginHistory.slice(-50);
                    await setDoc(userRef, userData, { merge: true });
                } catch(e) {}
                listenToUserDocument(username);
                listenToGlobalDatabase();
            }
            renderMain();
            initAudio();
        };

        window.logout = () => {
            username = '';
            userData = { mistakes: [], quizHistory: [], loginHistory: [], quizState: null };
            quizState = { active: false, isFinished: false, questions: [] };
            localStorage.removeItem(`CAPExam_last_user`);
            if(unsubscribeUser) unsubscribeUser();
            renderLogin();
        };

        window.renderLogin = () => {
            currentTab = 'login';
            el('app').innerHTML = `
                <div class="flex-1 flex items-center justify-center p-6 bg-gradient-to-br from-indigo-50 to-amber-50">
                    <div class="w-full max-w-md bg-white p-10 rounded-2xl shadow-xl border border-gray-100 text-center animate-fade-in">
                        <div class="text-amber-500 text-6xl mb-6"><i class="fas fa-book-open"></i></div>
                        <h1 class="text-4xl md:text-5xl font-black text-gray-800 mb-4 tracking-wide">CAP<span class="text-amber-500">.Exam</span></h1>
                        <p class="text-gray-500 mb-8 font-medium text-lg md:text-xl">會考模擬試題解析與線上測驗</p>
                        
                        <div class="space-y-4">
                            <input type="text" id="usernameInput" placeholder="輸入姓名開始使用" class="w-full px-5 py-4 rounded-xl border-2 border-gray-200 focus:outline-none focus:border-amber-400 focus:ring-4 focus:ring-amber-50 text-center text-xl md:text-2xl font-bold text-gray-700 transition-all">
                            <button onclick="handleLogin(document.getElementById('usernameInput').value)" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-4 px-6 rounded-xl shadow-md transition-colors text-xl md:text-2xl">
                                系統登入
                            </button>
                        </div>
                    </div>
                </div>
            `;
        };

        window.renderMain = () => {
            el('app').innerHTML = `
                <div class="flex flex-col md:flex-row w-full h-full">
                    <!-- Sidebar -->
                    <aside class="w-full md:w-72 bg-white border-r border-gray-200 flex flex-col shadow-sm z-20 shrink-0 h-auto md:h-full">
                        <div class="p-6 border-b border-gray-100 text-center">
                            <h1 class="text-3xl md:text-4xl font-black text-amber-500 tracking-wider">CAP<span class="text-gray-800">.Exam</span></h1>
                            <p class="text-sm md:text-base text-gray-400 font-bold mt-2">線上測驗與解析系統</p>
                        </div>
                        
                        <div class="p-6 flex flex-col items-center justify-center border-b border-gray-100">
                            <div class="w-20 h-20 md:w-24 md:h-24 bg-gray-50 rounded-full flex items-center justify-center text-gray-400 text-4xl md:text-5xl mb-4 border-4 border-white shadow-sm">
                                <i class="fas fa-user-graduate"></i>
                            </div>
                            <p class="text-lg md:text-xl font-bold text-gray-700">${username}，您好！</p>
                        </div>

                        <nav class="flex-1 overflow-y-auto py-4 flex flex-row md:flex-col overflow-x-auto md:overflow-x-hidden">
                            <button onclick="switchTab('learn')" id="nav-learn" class="nav-item active w-full flex items-center px-6 py-4 text-base md:text-lg font-bold text-gray-600 whitespace-nowrap transition-colors">
                                <i class="fas fa-book w-8 text-center text-xl"></i><span>試題學習解析</span>
                            </button>
                            <button onclick="switchTab('quiz')" id="nav-quiz" class="nav-item w-full flex items-center px-6 py-4 text-base md:text-lg font-bold text-gray-600 whitespace-nowrap transition-colors">
                                <i class="fas fa-pen-alt w-8 text-center text-xl"></i><span>未完成試卷 / 測驗</span>
                            </button>
                            <button onclick="switchTab('mistakes')" id="nav-mistakes" class="nav-item w-full flex items-center px-6 py-4 text-base md:text-lg font-bold text-gray-600 whitespace-nowrap transition-colors">
                                <i class="fas fa-times-circle w-8 text-center text-xl"></i><span>錯題本複習</span>
                            </button>
                            <button onclick="switchTab('history')" id="nav-history" class="nav-item w-full flex items-center px-6 py-4 text-base md:text-lg font-bold text-gray-600 whitespace-nowrap transition-colors">
                                <i class="fas fa-history w-8 text-center text-xl"></i><span>歷史紀錄</span>
                            </button>
                        </nav>

                        <div class="p-4 border-t border-gray-100 space-y-3 shrink-0 hidden md:block">
                            <button onclick="window.open('migration_tool.html', '_blank')" class="w-full flex items-center justify-center bg-indigo-50 text-indigo-600 hover:bg-indigo-100 font-bold py-3 rounded-lg transition-colors text-base border border-indigo-200 shadow-sm">
                                <i class="fas fa-database mr-2"></i>題庫管理系統
                            </button>
                            <button onclick="forceRefreshData()" class="w-full bg-amber-400 hover:bg-amber-500 text-white font-bold py-3 rounded-lg transition-colors text-base shadow-sm">
                                系統重新整理
                            </button>
                            <button onclick="logout()" class="w-full bg-sky-400 hover:bg-sky-500 text-white font-bold py-3 rounded-lg transition-colors text-base shadow-sm">
                                系統登出
                            </button>
                        </div>
                    </aside>

                    <!-- Main Content -->
                    <main class="flex-1 flex flex-col h-full overflow-hidden bg-[#f5f6fa] relative">
                        <div class="md:hidden bg-white p-3 border-b flex justify-between items-center z-10 shrink-0 shadow-sm">
                            <span class="font-bold text-gray-700 text-lg">CAP.Exam</span>
                            <div class="flex gap-2">
                                <button onclick="window.open('migration_tool.html', '_blank')" class="text-sm font-bold bg-indigo-50 text-indigo-600 border border-indigo-200 px-4 py-2 rounded-lg"><i class="fas fa-database"></i></button>
                                <button onclick="logout()" class="text-sm font-bold bg-gray-200 text-gray-700 px-4 py-2 rounded-lg">登出</button>
                            </div>
                        </div>
                        <div id="main-content" class="flex-1 overflow-hidden relative"></div>
                    </main>
                </div>
            `;
            switchTab('learn');
        };

        window.forceRefreshData = () => {
            listenToGlobalDatabase();
            customAlert("已重新向伺服器請求最新題庫資料！");
        };

        window.switchTab = (tab) => {
            currentTab = tab;
            ['learn', 'quiz', 'mistakes', 'history'].forEach(t => {
                const elBtn = el(`nav-${t}`);
                if(elBtn) {
                    if (t === tab) elBtn.classList.add('active');
                    else elBtn.classList.remove('active');
                }
            });

            const content = el('main-content');
            if(tab === 'learn') renderLearnView(content);
            if(tab === 'quiz') renderQuizView(content);
            if(tab === 'mistakes') renderMistakes(content);
            if(tab === 'history') renderHistory(content);
        };

        const getFilteredQuestions = () => {
            return allQuestions.filter(q => {
                const matchSubj = currentFilter.subject === "全部" || q.subject === currentFilter.subject;
                const matchBank = currentFilter.bank === "全部" || q.bank === currentFilter.bank;
                const matchVol = currentFilter.volume === "全部" || q.volume === currentFilter.volume;
                return matchSubj && matchBank && matchVol;
            }).sort((a, b) => {
                if(a.subject !== b.subject) return (a.subject || '').localeCompare(b.subject || '');
                if(a.bank !== b.bank) return (a.bank || '').localeCompare(b.bank || '');
                if(a.volume !== b.volume) return (a.volume || '').localeCompare(b.volume || '');
                return parseInt(a.number || 0) - parseInt(b.number || 0);
            });
        };

        const renderFilterBar = (onFilterChange) => {
            return `
                <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 mb-6 flex flex-wrap gap-5 items-center">
                    <div class="flex items-center gap-2">
                        <span class="font-bold text-gray-600 text-base md:text-lg"><i class="fas fa-book-open mr-1 text-gray-400"></i>科目：</span>
                        <select id="filter-subject" class="bg-gray-50 border border-gray-200 text-gray-700 text-base md:text-lg rounded-lg focus:ring-amber-500 focus:border-amber-500 block p-2.5 font-medium" onchange="${onFilterChange}">
                            ${SUBJECTS.map(s => `<option value="${s}" ${currentFilter.subject === s ? 'selected' : ''}>${s}</option>`).join('')}
                        </select>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="font-bold text-gray-600 text-base md:text-lg"><i class="fas fa-filter mr-1 text-gray-400"></i>題庫：</span>
                        <select id="filter-bank" class="bg-gray-50 border border-gray-200 text-gray-700 text-base md:text-lg rounded-lg focus:ring-amber-500 focus:border-amber-500 block p-2.5 font-medium" onchange="${onFilterChange}">
                            ${BANKS.map(b => `<option value="${b}" ${currentFilter.bank === b ? 'selected' : ''}>${b}</option>`).join('')}
                        </select>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="font-bold text-gray-600 text-base md:text-lg"><i class="fas fa-layer-group mr-1 text-gray-400"></i>冊別：</span>
                        <select id="filter-volume" class="bg-gray-50 border border-gray-200 text-gray-700 text-base md:text-lg rounded-lg focus:ring-amber-500 focus:border-amber-500 block p-2.5 font-medium" onchange="${onFilterChange}">
                            ${VOLUMES.map(v => `<option value="${v}" ${currentFilter.volume === v ? 'selected' : ''}>${v}</option>`).join('')}
                        </select>
                    </div>
                </div>
            `;
        };

        window.updateFiltersAndRenderLearn = () => {
            currentFilter.subject = el('filter-subject').value;
            currentFilter.bank = el('filter-bank').value;
            currentFilter.volume = el('filter-volume').value;
            renderLearnView(el('main-content'));
        };

        window.updateFiltersAndRenderQuiz = () => {
            currentFilter.subject = el('filter-subject').value;
            currentFilter.bank = el('filter-bank').value;
            currentFilter.volume = el('filter-volume').value;
            renderQuizView(el('main-content'));
        };

        const renderLearnView = (container) => {
            let filtered = getFilteredQuestions();
            
            // Generate DB Dashboard stats
            const counts = {};
            SUBJECTS.forEach(s => counts[s] = 0);
            allQuestions.forEach(q => { if (counts[q.subject] !== undefined) counts[q.subject]++; });
            
            let dashboardHtml = `
                <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 mb-6">
                    <h3 class="text-base md:text-lg font-bold text-gray-500 mb-4 flex items-center"><i class="fas fa-server mr-2 text-indigo-400"></i>各科題庫收錄狀態</h3>
                    <div class="flex flex-wrap gap-4">
                        ${SUBJECTS.filter(s => s !== "全部").map(s => {
                            const count = counts[s] || 0;
                            const isAvail = count > 0;
                            return `
                                <div class="flex items-center px-4 py-2 rounded-lg border ${isAvail ? 'bg-green-50 border-green-200' : 'bg-gray-50 border-gray-200'}">
                                    <div class="w-3 h-3 rounded-full mr-2 ${isAvail ? 'bg-green-500 animate-pulse' : 'bg-gray-300'}"></div>
                                    <span class="text-base md:text-lg font-bold ${isAvail ? 'text-green-700' : 'text-gray-500'}">${s}</span>
                                    <span class="ml-3 text-sm md:text-base font-black ${isAvail ? 'text-green-600 bg-green-200' : 'text-gray-400 bg-gray-200'} px-2 py-0.5 rounded-full">${count} 題</span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;

            let html = `
                <div class="w-full h-full p-4 md:p-8 overflow-y-auto">
                    <div class="max-w-4xl mx-auto">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl md:text-3xl font-black text-gray-800"><i class="fas fa-book text-amber-500 mr-2"></i>試題學習與解析</h2>
                            <span class="bg-indigo-100 text-indigo-800 font-bold px-4 py-1.5 rounded-full text-sm md:text-base border border-indigo-200 shadow-sm">過濾結果：${filtered.length} 題</span>
                        </div>
                        ${dashboardHtml}
                        ${renderFilterBar('updateFiltersAndRenderLearn()')}
            `;

            if (filtered.length === 0) {
                html += `
                    <div class="bg-white p-10 rounded-2xl shadow-sm border border-gray-200 text-center text-gray-500 mt-6 flex flex-col items-center">
                        <div class="text-6xl mb-4 opacity-50"><i class="fas fa-box-open"></i></div>
                        <p class="text-xl md:text-2xl font-bold">此範圍目前沒有試題</p>
                        <p class="mt-2 text-base md:text-lg">請嘗試切換上方的過濾條件，或前往「題庫管理系統」新增題目。</p>
                    </div></div></div>`;

                                        <div class="text-gray-500 font-medium">範圍：${h.subject || '全部'} | ${h.bank || '全部'} <span class="mx-2">•</span> 答對 ${h.correct} / ${h.total} 題</div>
                                    </div>
                                    <div class="text-3xl md:text-4xl font-black ${h.score >= 80 ? 'text-green-500' : (h.score < 60 ? 'text-red-500' : 'text-blue-500')}">${h.score}<span class="text-lg md:text-xl ml-1">分</span></div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div></div>
            `;
            container.innerHTML = html;
        };

        const initApp = async () => {
            const lastUser = localStorage.getItem(`CAPExam_last_user`);
            if (lastUser && isFirebaseInitialized) {
                username = lastUser;
                listenToUserDocument(username);
                listenToGlobalDatabase();
                renderMain();
            } else {
                renderLogin();
            }
        };

        // Ensure everything is ready before initializing
        window.onload = initApp;

    </script>
</body>
</html>
