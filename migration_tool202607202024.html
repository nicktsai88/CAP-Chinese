<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ 國文科模擬題庫管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-6 h-[100dvh] overflow-hidden flex flex-col">

    <div class="max-w-7xl mx-auto w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200 flex flex-col h-full">
        <div class="bg-amber-600 p-5 text-white flex justify-between items-center shrink-0">
            <h1 class="text-2xl font-black flex items-center gap-2"><i class="fas fa-database"></i> 國文科模擬題庫管理系統 (CAP-Chinese)</h1>
            <div id="status-badge" class="bg-red-500 text-white px-3 py-1 rounded-full text-sm font-bold shadow-inner flex items-center">
                <i class="fas fa-times-circle mr-1"></i>未連線
            </div>
        </div>

        <div class="flex flex-col md:flex-row flex-1 overflow-hidden">
            <!-- Left Panel: Forms -->
            <div class="w-full md:w-1/3 p-4 md:p-6 flex flex-col gap-6 overflow-y-auto custom-scrollbar border-r border-gray-200 bg-gray-50">
                
                <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
                    <h2 class="font-bold text-lg text-gray-700 mb-4 border-l-4 border-amber-500 pl-2">新增單筆題目</h2>
                    <div class="space-y-4 text-sm">
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block font-bold text-gray-600 mb-1">模擬題庫 *</label>
                                <select id="f-bank" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-amber-400 font-bold text-amber-700"></select>
                            </div>
                            <div>
                                <label class="block font-bold text-gray-600 mb-1">冊別範圍 *</label>
                                <select id="f-volume" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-amber-400 font-bold text-amber-700"></select>
                            </div>
                        </div>
                        
                        <div>
                            <label class="block font-bold text-gray-600 mb-1">題號 *</label>
                            <input type="text" id="f-number" placeholder="例如: 1" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-amber-400 font-bold">
                        </div>

                        <div>
                            <label class="block font-bold text-gray-600 mb-1">完整題目 *</label>
                            <textarea id="f-question" rows="4" placeholder="請輸入題目內容..." class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-amber-400"></textarea>
                        </div>

                        <div>
                            <label class="block font-bold text-gray-600 mb-1">附圖檔名或網址 (選填)</label>
                            <input type="text" id="f-image" placeholder="例如: q1.jpg 或是 https://..." class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-amber-400 font-mono text-sm text-blue-600">
                        </div>

                        <div class="space-y-2 border p-3 rounded-lg bg-gray-50">
                            <label class="block font-bold text-gray-700 mb-1">選項設定 *</label>
                            <div class="flex items-center gap-2"><span class="font-bold w-6 text-center">(A)</span><input type="text" id="f-optA" class="flex-1 px-2 py-1 rounded border"></div>
                            <div class="flex items-center gap-2"><span class="font-bold w-6 text-center">(B)</span><input type="text" id="f-optB" class="flex-1 px-2 py-1 rounded border"></div>
                            <div class="flex items-center gap-2"><span class="font-bold w-6 text-center">(C)</span><input type="text" id="f-optC" class="flex-1 px-2 py-1 rounded border"></div>
                            <div class="flex items-center gap-2"><span class="font-bold w-6 text-center">(D)</span><input type="text" id="f-optD" class="flex-1 px-2 py-1 rounded border"></div>
                            <div class="mt-3">
                                <label class="block font-bold text-red-600 mb-1">正確答案 *</label>
                                <select id="f-answer" class="w-full px-3 py-2 rounded-lg border border-red-300 bg-red-50 text-red-700 font-black focus:outline-none">
                                    <option value="0">(A)</option><option value="1">(B)</option><option value="2">(C)</option><option value="3">(D)</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block font-bold text-gray-600 mb-1">題幹分析 / 解題思考方向</label>
                            <textarea id="f-analysis" rows="3" placeholder="選填：白話文語譯、注釋、分析..." class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-amber-400"></textarea>
                        </div>

                        <div class="space-y-2 border p-3 rounded-lg bg-gray-50">
                            <label class="block font-bold text-gray-700 mb-1">選項解析 (選填)</label>
                            <div class="flex items-start gap-2"><span class="font-bold w-6 text-center mt-1">(A)</span><textarea id="f-expA" rows="2" class="flex-1 px-2 py-1 rounded border"></textarea></div>
                            <div class="flex items-start gap-2"><span class="font-bold w-6 text-center mt-1">(B)</span><textarea id="f-expB" rows="2" class="flex-1 px-2 py-1 rounded border"></textarea></div>
                            <div class="flex items-start gap-2"><span class="font-bold w-6 text-center mt-1">(C)</span><textarea id="f-expC" rows="2" class="flex-1 px-2 py-1 rounded border"></textarea></div>
                            <div class="flex items-start gap-2"><span class="font-bold w-6 text-center mt-1">(D)</span><textarea id="f-expD" rows="2" class="flex-1 px-2 py-1 rounded border"></textarea></div>
                        </div>

                        <button onclick="addSingleQuestion()" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 rounded-lg transition-colors mt-2 shadow-sm flex items-center justify-center">
                            <i class="fas fa-save mr-2"></i> 新增題目
                        </button>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="font-bold text-lg text-gray-700 border-l-4 border-blue-500 pl-2">批次匯入 (JSON)</h2>
                        <button onclick="copyJsonTemplate()" class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold py-1.5 px-3 rounded-lg flex items-center transition-colors border border-gray-200">
                            <i class="fas fa-copy mr-1"></i>複製標準格式
                        </button>
                    </div>
                    <div class="space-y-3 text-sm">
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block font-bold text-gray-600 mb-1">目標題庫 *</label>
                                <select id="b-bank" class="w-full px-2 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-blue-400 font-bold text-blue-700"></select>
                            </div>
                            <div>
                                <label class="block font-bold text-gray-600 mb-1">目標冊別 *</label>
                                <select id="b-volume" class="w-full px-2 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-blue-400 font-bold text-blue-700"></select>
                            </div>
                        </div>
                        <textarea id="b-json" rows="6" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-blue-400 text-xs font-mono custom-scrollbar" placeholder='[
  {
    "number": "1",
    "questionText": "題目內容...",
    "image": "q1.jpg",
    "options": ["選項A", "選項B", "選項C", "選項D"],
    "answer": 0, 
    "analysis": "題幹分析...",
    "optionExplanations": ["A解析", "B解析", "C解析", "D解析"]
  }
]'></textarea>
                        <p class="text-xs text-gray-400 font-bold">* answer 欄位請填寫數字: 0(A), 1(B), 2(C), 3(D)</p>
                        <button onclick="bulkImport()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2.5 rounded-lg transition-colors shadow-sm">
                            <i class="fas fa-upload mr-1"></i> 執行批次匯入
                        </button>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-xl border border-red-100 shadow-sm">
                    <h2 class="font-bold text-lg text-gray-700 mb-4 border-l-4 border-red-500 pl-2">批次刪除題庫</h2>
                    <div class="space-y-3 text-sm">
                        <div class="grid grid-cols-2 gap-3">
                            <select id="del-bank" class="w-full px-2 py-2 rounded border border-red-300 text-red-700 font-bold"></select>
                            <select id="del-volume" class="w-full px-2 py-2 rounded border border-red-300 text-red-700 font-bold"></select>
                        </div>
                        <button onclick="bulkDelete()" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-2.5 rounded-lg transition-colors mt-2 shadow-sm">
                            <i class="fas fa-trash-alt mr-1"></i> 執行批次刪除
                        </button>
                    </div>
                </div>
            </div>

            <div class="w-full md:w-2/3 p-4 md:p-6 flex flex-col bg-white overflow-hidden">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 shrink-0 gap-4">
                    <h2 class="font-black text-xl text-gray-800"><i class="fas fa-list-alt text-amber-500 mr-2"></i>題庫清單</h2>
                    <div class="flex gap-2 w-full md:w-auto">
                        <select id="filter-bank" onchange="renderTable()" class="px-3 py-2 rounded-lg border border-gray-300 font-bold text-slate-700 bg-slate-50 outline-none flex-1 md:w-40"></select>
                        <select id="filter-volume" onchange="renderTable()" class="px-3 py-2 rounded-lg border border-gray-300 font-bold text-slate-700 bg-slate-50 outline-none flex-1 md:w-40"></select>
                    </div>
                </div>
                
                <div class="flex-1 overflow-auto border border-gray-200 rounded-xl custom-scrollbar relative">
                    <table class="w-full text-left text-sm whitespace-nowrap min-w-max">
                        <thead class="bg-gray-100 text-gray-600 font-bold sticky top-0 z-10 shadow-sm">
                            <tr>
                                <th class="p-3 w-32">題庫 / 冊別</th>
                                <th class="p-3 w-16 text-center">題號</th>
                                <th class="p-3">題目預覽 (截斷)</th>
                                <th class="p-3 w-20 text-center">答案</th>
                                <th class="p-3 w-20 text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody id="q-table-body" class="divide-y divide-gray-100">
                            <!-- Injected by JS -->
                        </tbody>
                    </table>
                </div>
                <div class="text-sm font-bold text-gray-500 text-right mt-3 shrink-0" id="total-count">總計: 0 題</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAxQFt76ZPXE7d0i1XeNZ1yiiD2WYNIfHs", 
            authDomain: "chinese-learning-47f4d.firebaseapp.com",
            projectId: "chinese-learning-47f4d",
            storageBucket: "chinese-learning-47f4d.firebasestorage.app",
            messagingSenderId: "76289812052",
            appId: "1:76289812052:web:898384a916f9f341f62fc1"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'CAP-Chinese-App';
        const COLLECTION_NAME = 'Questions'; // 儲存題目的集合名稱
        
        let db, auth;
        let allQuestions = [];

        // 系統常數設定
        const BANKS = ["文揚題庫", "3688", "3800", "3800+"];
        const VOLUMES = ["第1冊", "第2冊", "第1~2冊", "第3冊", "第1~3冊", "第4冊", "第1~4冊", "第5冊", "第1~5冊", "第6冊", "第1~6冊"];
        const ANS_MAP = ['A', 'B', 'C', 'D'];

        // 自訂 Alert 與 Confirm 模組
        window.customAlert = (msg) => {
            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 bg-black/40 z-[110] flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in';
            overlay.innerHTML = `
                <div class="bg-white rounded-xl p-6 max-w-sm w-full shadow-2xl text-center">
                    <div class="text-amber-500 text-4xl mb-4"><i class="fas fa-info-circle"></i></div>
                    <p class="text-slate-700 mb-6 font-bold text-lg leading-relaxed whitespace-pre-wrap">${msg}</p>
                    <button id="btn-alert-ok" class="px-6 py-2 rounded-full font-bold bg-amber-500 text-white hover:bg-amber-600 transition-colors w-full">知道了</button>
                </div>
            `;
            document.body.appendChild(overlay);
            document.getElementById('btn-alert-ok').onclick = () => document.body.removeChild(overlay);
        };

        window.customConfirm = (msg, onYes, onNo) => {
            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 bg-black/40 z-[100] flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in';
            overlay.innerHTML = `
                <div class="bg-white rounded-xl p-6 max-w-sm w-full shadow-2xl">
                    <div class="flex items-center mb-4 text-red-500">
                        <i class="fas fa-exclamation-triangle text-2xl mr-3"></i>
                        <h3 class="text-xl font-bold">請確認操作</h3>
                    </div>
                    <p class="text-slate-600 mb-6 font-medium leading-relaxed whitespace-pre-wrap">${msg}</p>
                    <div class="flex justify-end space-x-3">
                        <button id="btn-modal-no" class="px-5 py-2 rounded-lg font-bold bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors">取消</button>
                        <button id="btn-modal-yes" class="px-5 py-2 rounded-lg font-bold bg-red-500 text-white hover:bg-red-600 transition-colors">確定執行</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            document.getElementById('btn-modal-no').onclick = () => { document.body.removeChild(overlay); if(onNo) onNo(); };
            document.getElementById('btn-modal-yes').onclick = () => { document.body.removeChild(overlay); if(onYes) onYes(); };
        };

        const initSelects = () => {
            const bankHtml = BANKS.map(b => `<option value="${b}">${b}</option>`).join('');
            const volHtml = VOLUMES.map(v => `<option value="${v}">${v}</option>`).join('');
            
            document.getElementById('f-bank').innerHTML = bankHtml;
            document.getElementById('f-volume').innerHTML = volHtml;
            
            document.getElementById('b-bank').innerHTML = bankHtml;
            document.getElementById('b-volume').innerHTML = volHtml;
            
            document.getElementById('del-bank').innerHTML = `<option value="ALL">全部題庫 (危險)</option>` + bankHtml;
            document.getElementById('del-volume').innerHTML = `<option value="ALL">全部冊別 (危險)</option>` + volHtml;
            
            document.getElementById('filter-bank').innerHTML = `<option value="ALL">所有題庫</option>` + bankHtml;
            document.getElementById('filter-volume').innerHTML = `<option value="ALL">所有冊別</option>` + volHtml;
        };

        const updateStatus = (msg, isConnected, colorClass = null) => {
            const badge = document.getElementById('status-badge');
            badge.innerHTML = `<i class="fas ${isConnected ? 'fa-check-circle' : 'fa-times-circle'} mr-1"></i>${msg}`;
            badge.className = `px-3 py-1 rounded-full text-sm font-bold shadow-inner text-white flex items-center ${colorClass ? colorClass : (isConnected ? 'bg-green-500' : 'bg-red-500')}`;
        };

        window.renderTable = () => {
            const tbody = document.getElementById('q-table-body');
            const fBank = document.getElementById('filter-bank').value;
            const fVol = document.getElementById('filter-volume').value;
            
            let filtered = allQuestions.filter(q => {
                const matchBank = fBank === 'ALL' || q.bank === fBank;
                const matchVol = fVol === 'ALL' || q.volume === fVol;
                return matchBank && matchVol;
            });
            
            // 排序: 題庫 -> 冊別 -> 題號
            filtered.sort((a,b) => {
                if((a.bank||'') !== (b.bank||'')) return (a.bank||'').localeCompare(b.bank||'');
                if((a.volume||'') !== (b.volume||'')) return (a.volume||'').localeCompare(b.volume||'');
                return parseInt(a.number||0) - parseInt(b.number||0);
            });

            document.getElementById('total-count').innerText = `目前顯示: ${filtered.length} 題 / 總庫存: ${allQuestions.length} 題`;

            tbody.innerHTML = filtered.map(q => {
                const textPreview = (q.questionText || '').substring(0, 30) + ((q.questionText || '').length > 30 ? '...' : '');
                const ansChar = ANS_MAP[q.answer] || '?';
                
                return `
                <tr class="hover:bg-amber-50/50 transition-colors border-b border-gray-50">
                    <td class="p-3 text-xs">
                        <div class="font-bold text-amber-700 bg-amber-100 px-2 py-0.5 rounded inline-block mb-1">${q.bank}</div><br>
                        <div class="text-gray-500">${q.volume}</div>
                    </td>
                    <td class="p-3 text-center font-black text-gray-700 text-lg">#${q.number}</td>
                    <td class="p-3">
                        <div class="truncate max-w-[200px] md:max-w-[400px] text-gray-800 font-medium" title="${q.questionText}">${textPreview}</div>
                        <div class="flex gap-2">
                            ${q.image ? `<div class="text-[10px] text-emerald-500 mt-1"><i class="fas fa-image"></i> 包含圖片</div>` : ''}
                            ${q.analysis ? `<div class="text-[10px] text-blue-500 mt-1"><i class="fas fa-lightbulb"></i> 包含解析</div>` : ''}
                        </div>
                    </td>
                    <td class="p-3 text-center">
                        <span class="bg-green-100 text-green-700 font-black px-2 py-1 rounded-full">${ansChar}</span>
                    </td>
                    <td class="p-3 text-right">
                        <button onclick="deleteQuestion('${q.id}')" class="bg-red-50 text-red-500 hover:bg-red-500 hover:text-white px-3 py-1.5 rounded-lg font-bold text-xs transition-colors border border-red-200">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                </tr>
            `}).join('');
        };

        window.addSingleQuestion = async () => {
            const bank = document.getElementById('f-bank').value;
            const volume = document.getElementById('f-volume').value;
            const number = document.getElementById('f-number').value.trim();
            const questionText = document.getElementById('f-question').value.trim();
            const image = document.getElementById('f-image').value.trim();
            
            const optA = document.getElementById('f-optA').value.trim();
            const optB = document.getElementById('f-optB').value.trim();
            const optC = document.getElementById('f-optC').value.trim();
            const optD = document.getElementById('f-optD').value.trim();
            
            const answer = parseInt(document.getElementById('f-answer').value);
            
            const analysis = document.getElementById('f-analysis').value.trim();
            const expA = document.getElementById('f-expA').value.trim();
            const expB = document.getElementById('f-expB').value.trim();
            const expC = document.getElementById('f-expC').value.trim();
            const expD = document.getElementById('f-expD').value.trim();

            if(!number || !questionText || !optA || !optB || !optC || !optD) {
                return customAlert("題號、題目與四個選項皆為必填！");
            }

            const docId = crypto.randomUUID();
            const payload = {
                id: docId,
                bank, volume, number, questionText, image,
                options: [optA, optB, optC, optD],
                answer,
                analysis,
                optionExplanations: [expA, expB, expC, expD],
                createdAt: new Date().toISOString()
            };

            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, docId), payload);
                
                // 清空表單
                ['f-number', 'f-question', 'f-image', 'f-optA', 'f-optB', 'f-optC', 'f-optD', 'f-analysis', 'f-expA', 'f-expB', 'f-expC', 'f-expD']
                    .forEach(id => document.getElementById(id).value = '');
                
                customAlert(`成功新增題目：${bank} ${volume} #${number}`);
            } catch(e) {
                console.error(e);
                customAlert("新增失敗，請檢查網路連線或權限。");
            }
        };

        window.copyJsonTemplate = () => {
            const template = `[
  {
    "number": "1",
    "questionText": "題目內容...",
    "image": "q1.jpg",
    "options": ["選項A", "選項B", "選項C", "選項D"],
    "answer": 0, 
    "analysis": "題幹分析...",
    "optionExplanations": ["A解析", "B解析", "C解析", "D解析"]
  }
]`;
            const textArea = document.createElement("textarea");
            textArea.value = template;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                customAlert("標準題目 JSON 格式已複製到剪貼簿！");
            } catch (err) {
                customAlert("複製失敗，請手動複製！");
            }
            document.body.removeChild(textArea);
        };

        window.bulkImport = async () => {
            const text = document.getElementById('b-json').value.trim();
            const targetBank = document.getElementById('b-bank').value;
            const targetVolume = document.getElementById('b-volume').value;
            
            if(!text) return customAlert("請輸入 JSON 資料");
            
            try {
                const data = JSON.parse(text);
                if(!Array.isArray(data)) return customAlert("請提供 JSON 陣列格式！\n範例：[{\"number\":\"1\"...}]");
                
                let count = 0;
                for(let item of data) {
                    const docId = crypto.randomUUID();
                    // 基本結構驗證與補全，強制套用選取的目標題庫與冊別
                    const payload = {
                        id: docId,
                        bank: targetBank,
                        volume: targetVolume,
                        number: item.number || String(count+1),
                        questionText: item.questionText || item.題目 || '',
                        image: item.image || item.圖片 || '',
                        options: item.options || item.選項 || ["選項缺漏", "選項缺漏", "選項缺漏", "選項缺漏"],
                        answer: parseInt(item.answer) || 0,
                        analysis: item.analysis || item.題幹分析 || '',
                        optionExplanations: item.optionExplanations || item.選項解析 || ["", "", "", ""],
                        createdAt: new Date().toISOString()
                    };
                    
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, docId), payload);
                    count++;
                }
                customAlert(`成功批次匯入 ${count} 筆題目至：\n${targetBank} - ${targetVolume}`);
                document.getElementById('b-json').value = '';
            } catch(e) {
                console.error(e);
                customAlert("JSON 解析失敗，請確認格式是否正確 (需為合法的 JSON 陣列，雙引號不能漏)。");
            }
        };

        window.bulkDelete = async () => {
            const bank = document.getElementById('del-bank').value;
            const volume = document.getElementById('del-volume').value;
            
            let msg = `即將刪除符合以下條件的題目：\n- 題庫: ${bank}\n- 冊別: ${volume}\n\n此操作無法復原，確定執行？`;
            
            customConfirm(msg, async () => {
                const toDelete = allQuestions.filter(q => {
                    const matchBank = bank === 'ALL' || q.bank === bank;
                    const matchVol = volume === 'ALL' || q.volume === volume;
                    return matchBank && matchVol;
                });

                if(toDelete.length === 0) return customAlert("該條件下目前沒有任何資料可以刪除！");

                try {
                    updateStatus("執行刪除中...", true, "bg-orange-500");
                    let count = 0;
                    for(let q of toDelete) {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, q.id));
                        count++;
                    }
                    customAlert(`成功批次刪除 ${count} 筆題目！`);
                    updateStatus("連線成功，即時同步中", true);
                } catch(e) {
                    console.error(e);
                    customAlert("批次刪除過程中發生錯誤！");
                    updateStatus("連線成功，即時同步中", true);
                }
            });
        };

        window.deleteQuestion = (docId) => {
            customConfirm("確定要刪除這筆題目嗎？", async () => {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, docId));
                } catch(e) {
                    console.error(e);
                    customAlert("刪除失敗！");
                }
            });
        };

        const initSystem = async () => {
            initSelects();
            try {
                // Check if API key is replaced or use default structure (Assuming provided config works or requires env replacement)
                const actualConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : firebaseConfig;
                
                const appInstance = initializeApp(actualConfig);
                auth = getAuth(appInstance);
                db = getFirestore(appInstance);

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        updateStatus("連線成功，即時同步中", true);
                        const qCol = collection(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME);
                        onSnapshot(qCol, (snap) => {
                            let temp = [];
                            snap.forEach(d => temp.push(d.data()));
                            allQuestions = temp;
                            window.renderTable();
                        }, (err) => {
                            console.error(err);
                            updateStatus("資料庫讀取權限遭拒或連線中斷", false);
                        });
                    } else {
                        updateStatus("未連線 (驗證失敗)", false);
                    }
                });

            } catch (error) {
                console.error(error);
                updateStatus("初始化失敗，請檢查 Firebase 設定", false);
            }
        };

        // Start system
        initSystem();
    </script>
</body>
</html>
